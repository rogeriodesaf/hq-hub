quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${HQHUB_DB_USUARIO:postgres}
quarkus.datasource.password=${HQHUB_DB_SENHA:postgres}
quarkus.datasource.jdbc.url=jdbc:postgresql://${HQHUB_DB_HOST:localhost}:${HQHUB_DB_PORT:5433}/hqhub
quarkus.datasource.jdbc.max-size=${HQHUB_DB_POOL_MAX:10}
quarkus.datasource.jdbc.min-size=${HQHUB_DB_POOL_MIN:1}
quarkus.datasource.jdbc.acquisition-timeout=${HQHUB_DB_POOL_TIMEOUT:30S}

quarkus.hibernate-orm.database.generation=none

quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=db/migration
quarkus.flyway.validate-on-migrate=false
quarkus.flyway.repair-at-start=true

quarkus.http.port=${PORT:8080}
quarkus.http.root-path=/api
quarkus.http.limits.max-body-size=${HQHUB_MAX_BODY_SIZE:20M}
quarkus.http.body.handle-file-uploads=true
quarkus.http.cors=true
quarkus.http.cors.origins=${APP_CORS_ORIGINS:http://localhost:4200}
quarkus.http.cors.methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
quarkus.http.cors.headers=accept,authorization,content-type,x-requested-with
quarkus.http.cors.exposed-headers=authorization
quarkus.http.cors.access-control-allow-credentials=true

quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/swagger
quarkus.swagger-ui.persist-authorization=true

# SMTP para redefinicao de senha (configure via variaveis de ambiente)
quarkus.mailer.host=${HQHUB_SMTP_HOST:smtp.gmail.com}
quarkus.mailer.port=${HQHUB_SMTP_PORT:587}
quarkus.mailer.username=${HQHUB_SMTP_USER:__NAO_CONFIGURADO__}
quarkus.mailer.password=${HQHUB_SMTP_PASS:__NAO_CONFIGURADO__}
quarkus.mailer.start-tls=REQUIRED
quarkus.mailer.from=${HQHUB_SMTP_FROM:HQ-HUB <noreply@hqhub.com.br>}
hqhub.smtp.usuario=${HQHUB_SMTP_USER:__NAO_CONFIGURADO__}
hqhub.smtp.senha=${HQHUB_SMTP_PASS:__NAO_CONFIGURADO__}

hqhub.url-base=${HQHUB_URL_BASE:https://hqhub-frontend.onrender.com}

mp.jwt.verify.issuer=hqhub
smallrye.jwt.verify.algorithm=HS256
smallrye.jwt.verify.key.location=jwt-segredo.jwk
hqhub.jwt.segredo=${HQHUB_JWT_SEGREDO:HQHUB-PRODUCAO-2026-SEGREDO-MUITO-GRANDE-E-SEGURO-123456789}

hqhub.integracoes.marvel.chave-publica=${HQHUB_MARVEL_CHAVE_PUBLICA:}
hqhub.integracoes.marvel.chave-privada=${HQHUB_MARVEL_CHAVE_PRIVADA:}
hqhub.integracoes.comicvine.chave-api=${HQHUB_COMICVINE_CHAVE_API:}

# Comic Vine REST Client
quarkus.rest-client."br.com.hqhub.service.ComicVineApiClient".url=https://comicvine.gamespot.com/api
quarkus.rest-client."br.com.hqhub.service.ComicVineApiClient".connect-timeout=30000
quarkus.rest-client."br.com.hqhub.service.ComicVineApiClient".read-timeout=30000
hqhub.uploads.feed.diretorio=${HQHUB_UPLOADS_FEED_DIRETORIO:uploads/feed}

# Upload de imagens via Cloudinary (opcional; quando ausente, usa disco local)
CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME:}
CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY:}
CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET:}
